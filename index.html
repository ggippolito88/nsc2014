<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coppa Non Solo Calcio – Esordienti 2014</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

:root {
  --navy:       #0b1a2e;
  --navy-mid:   #1a3356;
  --navy-light: #2255a0;
  --gold:       #d4a017;
  --gold-light: #f0c040;
  --cream:      #f5f2e8;
  --white:      #ffffff;
  --dark:       #0d1520;
  --red:        #c0392b;
  --field:      #1a4a2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--navy);
  background-image:
    radial-gradient(ellipse at 20% 0%,rgba(26,51,86,.6) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 100%,rgba(212,160,23,.07) 0%,transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(255,255,255,0.02)' stroke-width='1'%3E%3Cpath d='M0 30h60M30 0v60'/%3E%3C/g%3E%3C/svg%3E");
  font-family:'Barlow',sans-serif;
  min-height:100vh;
  padding:24px 12px 60px;
  color:var(--dark);
}
.wrapper{max-width:1000px;margin:0 auto;}

/* HEADER */
.header{text-align:center;margin-bottom:32px;animation:fadeDown .5s ease both;}
.trophy-line{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:8px;}
.trophy-ball{font-size:2.2rem;}
.header h1{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:clamp(1.7rem,5.5vw,3rem);
  color:var(--gold-light);letter-spacing:.05em;text-transform:uppercase;line-height:1;
}
.header h2{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.95rem;
  color:rgba(245,242,232,.6);letter-spacing:.18em;margin-top:6px;
}
.divider{width:80px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:12px auto 0;}

/* VENUES */
.venues{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;animation:fadeUp .5s ease .1s both;}
.venue-btn{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;padding:9px 16px;text-decoration:none;
  color:var(--cream);transition:all .2s;
}
.venue-btn:hover{background:rgba(255,255,255,.13);border-color:var(--gold-light);}
.venue-icon{font-size:1.1rem;}
.venue-info{text-align:left;}
.venue-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.07em;color:var(--gold-light);}
.venue-addr{font-size:.73rem;opacity:.6;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:8px;margin-bottom:26px;flex-wrap:wrap;animation:fadeUp .5s ease .2s both;}
.tab-btn{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;
  letter-spacing:.1em;padding:9px 26px;
  border:2px solid rgba(240,192,64,.3);background:rgba(255,255,255,.05);
  color:var(--cream);border-radius:4px;cursor:pointer;transition:all .2s;
}
.tab-btn:hover{background:rgba(240,192,64,.12);border-color:var(--gold-light);}
.tab-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);}

/* PANELS */
.panel{display:none;animation:fadeUp .35s ease both;}
.panel.active{display:block;}

/* STANDINGS */
.standings-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px;}
@media(max-width:680px){.standings-grid{grid-template-columns:1fr;}}
.standings-card{background:var(--cream);border-radius:10px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.45);}
.card-title{
  background:var(--navy-mid);color:var(--gold-light);
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1rem;
  letter-spacing:.12em;padding:11px 16px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
thead th{
  background:var(--navy);color:rgba(245,242,232,.6);
  font-family:'Barlow Condensed',sans-serif;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;font-size:.7rem;
  padding:8px 8px;text-align:center;
}
thead th:nth-child(2){text-align:left;padding-left:12px;}
tbody tr{border-bottom:1px solid rgba(0,0,0,.06);transition:background .15s;}
tbody tr:hover{background:rgba(26,51,86,.08);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:9px 8px;text-align:center;font-weight:500;}
tbody td:nth-child(2){text-align:left;padding-left:12px;}
.pos{font-weight:800;font-size:.9rem;display:inline-block;min-width:18px;}
.pos-1{color:#a07010;}
.pos-2{color:var(--navy-mid);}
.pos-3{color:#777;}
.pts-cell{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.05rem;color:var(--navy);}
.team-cell{display:flex;align-items:center;gap:7px;}
.team-logo-sm{width:22px;height:22px;object-fit:contain;border-radius:2px;}
.logo-ladispoli-a{outline:2px solid #c0392b;border-radius:2px;}
.logo-ladispoli-b{outline:2px solid #1a55c0;border-radius:2px;}
.team-name{font-family:'Barlow Condensed',sans-serif;font-size:.88rem;letter-spacing:.02em;font-weight:600;}

/* RESULTS */
.section-title{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;
  letter-spacing:.14em;color:var(--gold-light);
  text-transform:uppercase;padding:6px 0 10px;
  border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:12px;
}
.results-group{margin-bottom:26px;}
.results-list{display:flex;flex-direction:column;gap:7px;}
.result-row{
  background:var(--cream);border-radius:8px;
  padding:10px 13px;box-shadow:0 3px 10px rgba(0,0,0,.22);
  display:grid;grid-template-columns:64px 1fr auto;align-items:center;gap:8px;
}
.r-girone{
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.76rem;
  border-radius:3px;padding:2px 6px;text-align:center;letter-spacing:.04em;
}
.g-A{background:#1a3356;color:#f0c040;}
.g-B{background:#4a1a6b;color:#d4a0f0;}
.g-FINALI{background:var(--gold);color:var(--dark);}
.r-match{font-family:'Barlow Condensed',sans-serif;font-size:.92rem;font-weight:600;display:flex;align-items:center;gap:5px;}
.r-logo{width:18px;height:18px;object-fit:contain;}
.logo-a{outline:1.5px solid #c0392b;border-radius:1px;}
.logo-b{outline:1.5px solid #1a55c0;border-radius:1px;}
.r-score{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;color:var(--navy);white-space:nowrap;}
.r-score.pending{color:#aaa;font-size:.82rem;font-weight:500;}
.r-edit-btn{
  background:none;border:1px solid rgba(26,51,86,.35);border-radius:4px;
  padding:4px 9px;font-size:.73rem;color:var(--navy-mid);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-weight:600;letter-spacing:.05em;
  transition:all .15s;white-space:nowrap;
}
.r-edit-btn:hover{background:var(--navy-mid);color:#fff;}
.result-row.scheduled{background:#eeecea;opacity:.8;}
.r-venue{font-size:.72rem;color:#888;margin-left:4px;}

/* CALENDAR */
.cal-section{margin-bottom:22px;}
.cal-date-hdr{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;
  letter-spacing:.12em;color:var(--gold-light);
  padding:5px 0 8px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:9px;
  text-transform:uppercase;
}
.cal-match{
  background:rgba(255,255,255,.055);border-radius:7px;
  padding:9px 12px;margin-bottom:6px;
  display:grid;grid-template-columns:42px 62px 1fr auto;align-items:center;gap:8px;
  color:var(--cream);
}
.cal-time{font-size:.78rem;opacity:.55;}
.cal-lbl{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  border-radius:3px;padding:2px 6px;font-size:.74rem;letter-spacing:.05em;
  text-align:center;
}
.cal-teams{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.9rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cal-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:.98rem;white-space:nowrap;}
.cal-venue-tag{
  font-size:.68rem;background:rgba(255,255,255,.1);
  border-radius:3px;padding:1px 5px;color:rgba(245,242,232,.55);
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em;
  white-space:nowrap;
}

/* TEAMS TAB */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:20px;}
.team-card{
  background:var(--cream);border-radius:10px;padding:18px 12px;
  text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.3);
  transition:transform .2s;
}
.team-card:hover{transform:translateY(-3px);}
.team-card img{width:70px;height:70px;object-fit:contain;margin-bottom:10px;}
.team-card .tc-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;color:var(--navy);letter-spacing:.04em;}
.team-card .tc-girone{font-size:.73rem;color:#888;margin-top:3px;}
.girone-section-hdr{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;
  letter-spacing:.14em;color:var(--gold-light);
  text-transform:uppercase;padding:6px 0 10px;
  border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:14px;
}

/* ADMIN */
.admin-bar{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:16px;animation:fadeUp .4s ease .25s both;}
.admin-badge{
  font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.8rem;
  letter-spacing:.08em;padding:5px 14px;border-radius:20px;
  border:1px solid;cursor:pointer;transition:all .2s;
}
.admin-badge.logged-out{color:rgba(245,242,232,.5);border-color:rgba(245,242,232,.2);background:rgba(255,255,255,.04);}
.admin-badge.logged-out:hover{background:rgba(255,255,255,.1);}
.admin-badge.logged-in{color:var(--gold);border-color:var(--gold);background:rgba(212,160,23,.12);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--cream);border-radius:12px;padding:26px 24px;width:min(420px,94vw);box-shadow:0 16px 48px rgba(0,0,0,.5);animation:fadeUp .25s ease both;}
.modal h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.15rem;color:var(--navy);margin-bottom:16px;letter-spacing:.05em;text-transform:uppercase;}
.modal label{font-size:.81rem;font-weight:600;color:#444;display:block;margin-bottom:4px;}
.modal input[type=number],.modal input[type=password]{width:100%;border:1.5px solid #ccc;border-radius:5px;padding:9px 12px;font-size:1rem;font-family:'Barlow',sans-serif;margin-bottom:14px;transition:border .15s;}
.modal input:focus{outline:none;border-color:var(--navy-light);}
.score-inputs{display:grid;grid-template-columns:1fr 30px 1fr;gap:8px;align-items:center;margin-bottom:14px;}
.score-inputs .sep{text-align:center;font-weight:700;font-size:1.2rem;color:#666;}
.modal-actions{display:flex;gap:10px;margin-top:4px;}
.btn-save{flex:1;background:var(--navy-mid);color:#fff;border:none;border-radius:5px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.08em;cursor:pointer;transition:background .2s;}
.btn-save:hover{background:var(--navy-light);}
.btn-cancel{flex:1;background:#e0ddd2;color:#555;border:none;border-radius:5px;padding:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.08em;cursor:pointer;}
.btn-cancel:hover{background:#d0cdc2;}
.modal-msg{font-size:.82rem;color:var(--red);margin-top:8px;min-height:18px;}

@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrapper">

<div class="header">
  <div class="trophy-line">
    <span class="trophy-ball">⚽</span>
    <h1>Coppa Non Solo Calcio</h1>
    <span class="trophy-ball">⚽</span>
  </div>
  <h2>Esordienti 2014 &nbsp;·&nbsp; Riccione, 12–14 Giugno 2026</h2>
  <div class="divider"></div>
</div>

<!-- Venue links -->
<div class="venues">
  <a class="venue-btn" href="https://maps.google.com/?q=Via+Bergamo,+Riccione" target="_blank">
    <span class="venue-icon">📍</span>
    <div class="venue-info">
      <div class="venue-name">Campo San Lorenzo</div>
      <div class="venue-addr">Via Bergamo, Riccione</div>
    </div>
  </a>
  <a class="venue-btn" href="https://maps.google.com/?q=Viale+San+Francesco+23,+Rimini" target="_blank">
    <span class="venue-icon">📍</span>
    <div class="venue-info">
      <div class="venue-name">Campo Bellariva</div>
      <div class="venue-addr">V.le San Francesco 23, Rimini</div>
    </div>
  </a>
</div>

<!-- Admin bar -->
<div class="admin-bar">
  <span id="admin-badge" class="admin-badge logged-out" onclick="toggleLogin()">🔒 Admin</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('classifica',this)">Classifica</button>
  <button class="tab-btn" onclick="showTab('risultati',this)">Risultati</button>
  <button class="tab-btn" onclick="showTab('calendario',this)">Calendario</button>
  <button class="tab-btn" onclick="showTab('squadre',this)">Squadre</button>
</div>

<div id="tab-classifica" class="panel active"><div id="standings-container"></div></div>
<div id="tab-risultati" class="panel"><div id="results-container"></div></div>
<div id="tab-calendario" class="panel"><div id="calendario-container"></div></div>
<div id="tab-squadre" class="panel"><div id="squadre-container"></div></div>

</div>

<!-- MODAL login -->
<div id="modal-login" class="modal-overlay">
  <div class="modal">
    <h3>🔐 Accesso Admin</h3>
    <label>Password</label>
    <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-actions">
      <button class="btn-save" onclick="doLogin()">ENTRA</button>
      <button class="btn-cancel" onclick="closeModal('modal-login')">Annulla</button>
    </div>
    <div id="login-msg" class="modal-msg"></div>
  </div>
</div>

<!-- MODAL edit -->
<div id="modal-edit" class="modal-overlay">
  <div class="modal">
    <h3 id="edit-title">Inserisci Risultato</h3>
    <label>Gol <span id="edit-home-lbl"></span></label>
    <div class="score-inputs">
      <input type="number" id="edit-hg" min="0" max="30" placeholder="0">
      <div class="sep">–</div>
      <input type="number" id="edit-ag" min="0" max="30" placeholder="0">
    </div>
    <label style="opacity:0;font-size:.7rem">Gol <span id="edit-away-lbl"></span></label>
    <div style="margin-bottom:14px;display:flex;align-items:center;gap:8px;margin-top:4px;">
      <input type="checkbox" id="edit-unplayed" style="width:16px;height:16px;cursor:pointer;accent-color:var(--red);">
      <label for="edit-unplayed" style="font-size:.85rem;font-weight:600;color:var(--red);cursor:pointer;margin-bottom:0;">Segna come "da giocare" (annulla risultato)</label>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveResult()">SALVA</button>
      <button class="btn-cancel" onclick="closeModal('modal-edit')">Annulla</button>
    </div>
    <div id="edit-msg" class="modal-msg"></div>
  </div>
</div>

// ── STATE ────────────────────────────────────────────────
let isAdmin = false;

let gistId = FIXED_GIST_ID;
let ghToken = null;

function loadConfig() {
  try { ghToken = localStorage.getItem(LS_TOKEN) || null; } catch(e) {}
}
function saveConfig() {
  try { if (ghToken) localStorage.setItem(LS_TOKEN, ghToken); } catch(e) {}
}

async function loadOverrides() {
  loadConfig();
  if (!gistId) { overrides = {}; return; }
  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: {'Accept':'application/vnd.github.v3+json'}
    });
    if (!res.ok) { overrides = {}; return; }
    const data = await res.json();
    const content = data.files?.['nsc2014.json']?.content;
    if (content) overrides = JSON.parse(content);
  } catch(e) { overrides = {}; }
}

async function saveOverrides() {
  if (!gistId || !ghToken) return;
  try {
    await fetch(`https://api.github.com/gists/${gistId}`, {
      method:'PATCH',
      headers: {
        'Authorization':`token ${ghToken}`,
        'Accept':'application/vnd.github.v3+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        files: { 'nsc2014.json': { content: JSON.stringify(overrides) } }
      })
    });
  } catch(e) { console.error('Errore salvataggio:', e); }
}

function getMatches() {
  return BASE_MATCHES.map(m => overrides[m.id] ? {...m,...overrides[m.id]} : {...m});
}

// ── STANDINGS ────────────────────────────────────────────
function calcStandings(matches) {
  const s = {};
  GIRONI.forEach(g => {
    s[g] = {};
    TEAMS[g].forEach(t => { s[g][t] = {pts:0,g:0,v:0,p:0,sco:0,gf:0,gs:0}; });
  });
  matches.filter(m => m.played && GIRONI.includes(m.girone)).forEach(m => {
    const h = s[m.girone]?.[m.home];
    const a = s[m.girone]?.[m.away];
    if (!h || !a) return;
    h.g++; a.g++;
    h.gf += m.hg; h.gs += m.ag;
    a.gf += m.ag; a.gs += m.hg;
    if (m.hg > m.ag)      { h.v++; h.pts+=3; a.sco++; }
    else if (m.hg < m.ag) { a.v++; a.pts+=3; h.sco++; }
    else                   { h.p++; h.pts+=1; a.p++; a.pts+=1; }
  });
  return s;
}

function renderStandings() {
  const matches = getMatches();
  const st = calcStandings(matches);
  const container = document.getElementById('standings-container');
  const labels = {A:'🔵 Girone A', B:'🟣 Girone B'};
  container.innerHTML = `<div class="standings-grid">` + GIRONI.map(g => {
    const rows = Object.entries(st[g])
      .map(([t,s]) => ({t,...s,dr:s.gf-s.gs}))
      .sort((a,b) => b.pts-a.pts || b.dr-a.dr || b.gf-a.gf);
    return `<div class="standings-card">
      <div class="card-title">${labels[g]}</div>
      <table>
        <thead><tr>
          <th>#</th><th>Squadra</th><th>PTS</th><th>G</th><th>V</th><th>P</th><th>S</th><th>GF</th><th>GS</th><th>DR</th>
        </tr></thead>
        <tbody>
          ${rows.map((r,i) => {
            const pc = i===0?'pos pos-1':i===1?'pos pos-2':i===2?'pos pos-3':'pos';
            return `<tr>
              <td><span class="${pc}">${i+1}</span></td>
              <td><div class="team-cell">${logoImg(r.t,22,true)}<span class="team-name">${r.t}</span></div></td>
              <td class="pts-cell">${r.pts}</td>
              <td>${r.g}</td><td>${r.v}</td><td>${r.p}</td><td>${r.sco}</td>
              <td>${r.gf}</td><td>${r.gs}</td>
              <td>${r.dr>0?'+'+r.dr:r.dr}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }).join('') + `</div>`;
}

// ── HELPERS ──────────────────────────────────────────────
function dateKey(ds) { const [d,mo,y]=ds.split('.'); return parseInt(y+mo+d); }
function timeKey(ts) { if(!ts) return 9999; return parseInt(ts.replace(':','')); }
function groupByDate(arr) {
  const sorted = [...arr].sort((a,b) => {
    const dk=dateKey(a.date)-dateKey(b.date); if(dk!==0) return dk;
    return timeKey(a.time)-timeKey(b.time);
  });
  const map = new Map();
  sorted.forEach(m => { if(!map.has(m.date)) map.set(m.date,[]); map.get(m.date).push(m); });
  return map;
}
function venueShort(v) {
  if(v===SL) return 'SAN LORENZO';
  if(v===BLR) return 'BELLARIVA';
  return v||'';
}

        ${ms.map(m => {
          const gc = 'g-'+(m.girone==='FINALI'?'FINALI':m.girone);
          const isScheduled = !m.played;
          const scoreHtml = m.played
            ? `<span class="r-score">${m.hg} – ${m.ag}</span>`
            : `<span class="r-score pending">da giocare</span>`;
          const editBtn = isAdmin
            ? `<button class="r-edit-btn" onclick="openEdit('${m.id}')">✏️</button>` : '';
          const away = m.away ? ` <span style="opacity:.45">–</span> ${logoImg(m.away)} ${m.away}` : '';
          return `<div class="result-row${isScheduled?' scheduled':''}">
            <span class="r-girone cal-lbl ${gc}">${m.girone}</span>
            <span class="r-match">${logoImg(m.home)} ${m.home}${away} <span class="r-venue">[${venueShort(m.venue)}]</span></span>
            <div style="display:flex;align-items:center;gap:6px">${scoreHtml}${editBtn}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
}

// ── CALENDAR ─────────────────────────────────────────────
function renderCalendario() {
  const matches = getMatches();
  const container = document.getElementById('calendario-container');
  const byDate = groupByDate(matches);
  let html = '';
  byDate.forEach((ms, date) => {
    html += `<div class="cal-section">
      <div class="cal-date-hdr">📅 ${date}</div>
      ${ms.map(m => {
        const gc = 'g-'+(m.girone==='FINALI'?'FINALI':m.girone);
        const scoreHtml = m.played
          ? `<span class="cal-score">${m.hg}–${m.ag}</span>`
          : `<span style="opacity:.35;font-size:.75rem">–</span>`;
        const away = m.away ? ` <span style="opacity:.4">vs</span> ${logoImg(m.away)} ${m.away}` : '';
        return `<div class="cal-match">
          <span class="cal-time">${m.time||''}</span>
          <span class="cal-lbl ${gc}">${m.girone}</span>
          <span class="cal-teams">${logoImg(m.home)} ${m.home}${away}
            <span class="cal-venue-tag">${venueShort(m.venue)}</span>
          </span>
          ${scoreHtml}
        </div>`;
      }).join('')}
    </div>`;
  });
  container.innerHTML = html;
}

// ── SQUADRE ──────────────────────────────────────────────
function renderSquadre() {
  const container = document.getElementById('squadre-container');
  const allTeams = [
    {name:"CS LOCATE",      girone:"A"},
    {name:"LADISPOLI A",    girone:"A"},
    {name:"SANTA MARIA",    girone:"A"},
    {name:"OLGIATE",        girone:"A"},
    {name:"NUOVA RIETI",    girone:"A"},
    {name:"7 VALLI",        girone:"B"},
    {name:"GERENZANESE",    girone:"B"},
    {name:"LADISPOLI B",    girone:"B"},
    {name:"O. CALVENZANO",  girone:"B"},
    {name:"BAVENO",         girone:"B"},
  ];
  let html = '';
  ['A','B'].forEach(g => {
    const teams = allTeams.filter(t => t.girone === g);
    html += `<div class="girone-section-hdr">${g==='A'?'🔵':'🟣'} Girone ${g}</div>
    <div class="teams-grid">
      ${teams.map(t => {
        const tl = TEAM_LOGO[t.name];
        const borderCls = tl?.cls === 'logo-a' ? 'outline:3px solid #c0392b;border-radius:4px;' : tl?.cls === 'logo-b' ? 'outline:3px solid #1a55c0;border-radius:4px;' : '';
        const imgHtml = tl ? `<img src="${LOGOS[tl.key]}" style="width:70px;height:70px;object-fit:contain;${borderCls}">` : '⚽';
        return `<div class="team-card">
          ${imgHtml}
          <div class="tc-name">${t.name}</div>
          <div class="tc-girone">Girone ${t.girone}</div>
        </div>`;
      }).join('')}
    </div>`;
  });
  container.innerHTML = html;
}

// ── EDIT MODAL ───────────────────────────────────────────
function openEdit(id) {
  if (!isAdmin) return;
  const m = getMatches().find(x => x.id === id);
  if (!m) return;
  editingId = id;
  document.getElementById('edit-title').textContent = m.away ? `${m.home} – ${m.away}` : m.home;
  document.getElementById('edit-home-lbl').textContent = m.home;
  document.getElementById('edit-away-lbl').textContent = m.away || '';
  document.getElementById('edit-hg').value = m.hg ?? '';
  document.getElementById('edit-ag').value = m.ag ?? '';
  document.getElementById('edit-unplayed').checked = false;
  document.getElementById('edit-msg').textContent = '';
  document.getElementById('modal-edit').classList.add('open');
  document.getElementById('edit-hg').focus();
}

function saveResult() {
  const msg = document.getElementById('edit-msg');
  const unplayed = document.getElementById('edit-unplayed').checked;
  if (unplayed) {
    overrides[editingId] = {hg:null,ag:null,played:false};
    closeModal('modal-edit'); renderAll();
    saveOverrides().then(() => showToast('✅ Risultato annullato'));
    return;
  }
  const hg = parseInt(document.getElementById('edit-hg').value);
  const ag = parseInt(document.getElementById('edit-ag').value);
  if (isNaN(hg)||isNaN(ag)||hg<0||ag<0) { msg.textContent='⚠️ Inserisci valori validi (≥ 0)'; return; }
  overrides[editingId] = {hg, ag, played:true};
  closeModal('modal-edit'); renderAll();
  saveOverrides().then(() => showToast('✅ Salvato!'));
}

// ── LOGIN ─────────────────────────────────────────────────
function toggleLogin() {
  if (isAdmin) {
    isAdmin = false; updateAdminBadge(); renderAll();
  } else {
    document.getElementById('pwd-input').value='';
    document.getElementById('login-msg').textContent='';
    document.getElementById('modal-login').classList.add('open');
    setTimeout(() => document.getElementById('pwd-input').focus(), 100);
  }
}
function doLogin() {
  if (document.getElementById('pwd-input').value === ADMIN_PASSWORD) {
    isAdmin = true; loadConfig();
    if (!ghToken) {
      const t = prompt('GitHub token per salvare online:');
      if (t) { ghToken = t.trim(); saveConfig(); }
    }
    updateAdminBadge(); closeModal('modal-login'); renderAll();
  } else {
    document.getElementById('login-msg').textContent = '❌ Password errata';
  }
}
function updateAdminBadge() {
  const b = document.getElementById('admin-badge');
  if (isAdmin) { b.className='admin-badge logged-in'; b.textContent='✅ Admin (clicca per uscire)'; }
  else         { b.className='admin-badge logged-out'; b.textContent='🔒 Admin'; }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); });
});
['edit-hg','edit-ag'].forEach(fId => {
  document.getElementById(fId).addEventListener('keydown', e => { if(e.key==='Enter') saveResult(); });
});

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a3356;color:#fff;padding:10px 24px;border-radius:24px;font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;z-index:3000;box-shadow:0 4px 18px rgba(0,0,0,.35);transition:opacity .4s;';
    document.body.appendChild(t);
  }
  t.textContent=msg; t.style.opacity='1';
  clearTimeout(t._timer); t._timer=setTimeout(() => { t.style.opacity='0'; }, 2500);
}

function showTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function renderAll() {
  renderStandings(); renderResults(); renderCalendario(); renderSquadre();
}

(async () => {
  loadConfig();
  renderAll();
  await loadOverrides();
  renderAll();
})();
</script>
</body>
</html>
